<svg xmlns="http://www.w3.org/2000/svg" width="880" height="336" viewBox="0 0 880 336" font-family="'Quicksand','Comic Sans MS','Trebuchet MS',sans-serif">
  <defs>
    <linearGradient id="pw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDF8EE"/><stop offset="1" stop-color="#FBF2E3"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="880" height="336" rx="20" fill="url(#pw)" stroke="#EBDAC2" stroke-width="2"/>

  <!-- title with highlighter -->
  <rect x="38" y="30" width="196" height="26" rx="8" fill="#FFDF8A" opacity="0.5"/>
  <text x="46" y="51" font-size="26" font-weight="700" fill="#6E5A93">why it's nice</text>
  <path d="M244 38 c2.6-3.1 8.6-1.7 8.6 2.4 c0 3.6-6 7-8.6 8.6 c-2.6-1.6-8.6-5-8.6-8.6 c0-4.1 6-5.5 8.6-2.4 z" fill="#FF8FA8"/>

  <!-- row 1: talk (speech) -->
  <rect x="44" y="86" width="36" height="36" rx="11" fill="#D6F0E3"/>
  <rect x="52" y="95" width="21" height="13" rx="5" fill="#65B892"/>
  <path d="M57 108 v6 l6 -6 z" fill="#65B892"/>
  <text x="98" y="110" font-size="16.5"><tspan font-weight="700" fill="#5B4B77">Talk, don't fill forms</tspan><tspan fill="#9A8FA8"> — a complaint, a note, mid-sentence.</tspan></text>

  <!-- row 2: auto-sorted (calendar) -->
  <rect x="44" y="134" width="36" height="36" rx="11" fill="#FCE3D2"/>
  <rect x="52" y="144" width="20" height="17" rx="3" fill="none" stroke="#E08A5A" stroke-width="2.2"/>
  <rect x="52" y="144" width="20" height="6" rx="3" fill="#E08A5A"/>
  <text x="98" y="158" font-size="16.5"><tspan font-weight="700" fill="#5B4B77">Auto-sorted &amp; dated</tspan><tspan fill="#9A8FA8"> — the right note, one clean line.</tspan></text>

  <!-- row 3: answers back (bulb) -->
  <rect x="44" y="182" width="36" height="36" rx="11" fill="#FCEFC2"/>
  <circle cx="62" cy="196" r="8" fill="#E0A93E"/>
  <rect x="58" y="203" width="8" height="6" rx="2" fill="#E0A93E"/>
  <text x="98" y="206" font-size="16.5"><tspan font-weight="700" fill="#5B4B77">It answers back</tspan><tspan fill="#9A8FA8"> — a gentle nudge when it helps, quiet when it doesn't.</tspan></text>

  <!-- row 4: never loses (shield) -->
  <rect x="44" y="230" width="36" height="36" rx="11" fill="#D7E6F6"/>
  <path d="M62 238 l11 4 v7 c0 8 -11 12 -11 12 c0 0 -11 -4 -11 -12 v-7 z" fill="#6E93C8"/>
  <text x="98" y="254" font-size="16.5"><tspan font-weight="700" fill="#5B4B77">Never loses a word</tspan><tspan fill="#9A8FA8"> — every message is backed up before it's filed.</tspan></text>

  <!-- row 5: yours (lock) -->
  <rect x="44" y="278" width="36" height="36" rx="11" fill="#FBD9E2"/>
  <path d="M56 296 v-3 a6 6 0 0 1 12 0 v3" fill="none" stroke="#D06A8A" stroke-width="2.4"/>
  <rect x="53" y="296" width="18" height="14" rx="3" fill="#D06A8A"/>
  <text x="98" y="302" font-size="16.5"><tspan font-weight="700" fill="#5B4B77">Yours alone</tspan><tspan fill="#9A8FA8"> — local markdown. no cloud, no account, no tracking.</tspan></text>
</svg>
