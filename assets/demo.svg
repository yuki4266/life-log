  <circle cx="46" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="20" r="6" fill="#27c93f"/>
  <text x="440" y="25" text-anchor="middle" fill="#6e7681" font-size="13">life-log — ~/journal</text>

