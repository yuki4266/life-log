<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260" font-family="'Quicksand','Comic Sans MS','Trebuchet MS',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF1F4"/>
      <stop offset="1" stop-color="#F1EDFF"/>
    </linearGradient>
  </defs>

  <!-- soft rounded backdrop -->
  <rect x="0" y="0" width="880" height="260" rx="28" fill="url(#bg)"/>

  <!-- sparkles -->
  <g fill="#FFD98A">
    <path d="M150 60 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
    <path d="M726 78 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
  </g>
  <g fill="#FF9EB5">
    <path d="M712 150 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z"/>
    <path d="M168 168 l2.5 6 6 2.5 -6 2.5 -2.5 6 -2.5 -6 -6 -2.5 6 -2.5 z"/>
  </g>

  <!-- mascot: a happy little notebook -->
  <g>
    <!-- body -->
    <rect x="399" y="36" width="82" height="92" rx="16" fill="#FFDCCB" stroke="#FFB49A" stroke-width="2.5"/>
    <!-- spine -->
    <rect x="399" y="36" width="15" height="92" rx="7.5" fill="#FFB49A"/>
    <!-- heart bookmark -->
    <path d="M470 30 c2.4-3 8-1.6 8 2.2 c0 3.4-5.6 6.6-8 8 c-2.4-1.4-8-4.6-8-8 c0-3.8 5.6-5.2 8-2.2 z" fill="#FF7E9B"/>
    <!-- cheeks -->
    <ellipse cx="428" cy="94" rx="6" ry="4" fill="#FF9EB5" opacity="0.55"/>
    <ellipse cx="462" cy="94" rx="6" ry="4" fill="#FF9EB5" opacity="0.55"/>
    <!-- eyes -->
    <circle cx="431" cy="82" r="4" fill="#6E5A77"/>
    <circle cx="459" cy="82" r="4" fill="#6E5A77"/>
    <!-- smile -->
    <path d="M432 90 q13 12 26 0" fill="none" stroke="#6E5A77" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <text x="440" y="184" text-anchor="middle" font-size="54" font-weight="700" fill="#6E5A93" letter-spacing="1">life·log</text>

  <!-- tagline -->
  <text x="440" y="214" text-anchor="middle" font-size="18" fill="#9A8FA8">the life log you just talk to</text>
</svg>
